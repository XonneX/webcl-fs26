<!DOCTYPE HTML>
<html lang="en">

<head>
    <title>Css background</title>
    <style>
        body {
        }
        .exampleDiv {
            width:          50%;
            aspect-ratio:   1 / 1;
        }
        .animatedRainbow {
            --borderWidth:  3em;
            --_angle:       0deg;

            border:         var(--borderWidth) solid #0000;
            border-radius:  calc(var(--borderWidth) * 2);
            background:
                linear-gradient(Canvas,Canvas) padding-box,
                conic-gradient(
                    from var(--_angle)
                    in hsl longer hue,
                    red, red
                ) border-box;
            ;
            transition: all .5s ease-in-out;
            &:hover {
                corner-shape: bevel;
                border-radius: 30%;
                animation:
                    rundummeli 5s infinite linear
            ;
            }
        }
        @property --_angle {
          syntax:           "<angle>";
          inherits:         true;
          initial-value:    0deg;
        }
        @keyframes rundummeli {
            100% {
                --_angle: 360deg;
            }
        }


    </style>
</head>

<body>

<div class="exampleDiv animatedRainbow"></div>
<button
    class="animatedRainbow"
    style="--borderWidth: 2px"
> Hallo </button>

</body>

</html>
