<!DOCTYPE HTML>
<html lang="en">

<head>
    <title>Css Container styled query</title>
    <style>

        @container style(--my-effect: redTilted){
            div {
                color: red;
                transform: rotate( 2deg);
            }
        }
        .myClass {
            & div {
                /* all my own styles */
                background-color: peachpuff;
                transform-origin: left top;
            }
            /* plus all styles from some other place */
            --my-effect: redTilted;
        }
        .myOtherClass {
            & div {
                /* all my own styles */
                background-color: green;
                transform-origin: left top;
            }
            /* plus all styles from some other place */
            --my-effect: redTilted;
        }
    </style>
</head>

<body>

<div class="myClass">
    Outer
    <div>Red and tilted in Chrome and Safari but not in FF.</div>
</div>

<div class="myOtherClass">
    Outer untouched
    <div>Inner untouched</div>
</div>



</body>

</html>
